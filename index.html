<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Harmonium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f7f5f0;
            --surface: #ffffff;
            --border: #e2ddd6;
            --ink: #1a1714;
            --ink-mid: #6b6560;
            --accent: #d35400; /* Added a touch of color for visibility */
            --white-key: #fafaf8;
            --black-key: #1a1714;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--ink);
            font-family: 'DM Mono', monospace;
            overflow: hidden;
        }

        /* ── SPLASH SCREEN (The White Page Fix) ── */
        #splash {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s ease, visibility 0.6s;
            cursor: pointer;
        }

        #splash.out {
            opacity: 0;
            visibility: hidden;
        }

        #splash-title {
            font-family: 'DM Serif Display', serif;
            font-size: 3rem;
            margin-bottom: 20px;
            text-align: center;
        }

        .loading-text {
            font-size: 0.9rem;
            color: var(--ink-mid);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ── MAIN APP ── */
        #app {
            display: none;
            opacity: 0;
            transition: opacity 0.8s ease;
            padding: 20px;
            height: 100vh;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #app.visible {
            display: flex;
            opacity: 1;
        }

        .keyboard {
            display: flex;
            position: relative;
            background: #4a3728;
            padding: 10px;
            border-radius: 4px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .key {
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s;
        }

        .key.white {
            width: 60px;
            height: 200px;
            background: var(--white-key);
            border: 1px solid var(--border);
            border-radius: 0 0 4px 4px;
            z-index: 1;
        }

        .key.black {
            width: 40px;
            height: 120px;
            background: var(--black-key);
            margin-left: -20px;
            margin-right: -20px;
            z-index: 2;
            border-radius: 0 0 2px 2px;
        }

        .key:active, .key.active {
            transform: translateY(2px);
            background: #e0e0e0;
        }

        .key.black:active, .key.black.active {
            background: #333;
        }
    </style>
</head>
<body>

    <div id="splash">
        <div id="splash-title">HARMONIUM</div>
        <div class="loading-text">Click anywhere to start</div>
    </div>

    <div id="app">
        <h1 style="margin-bottom: 30px; font-family: 'DM Serif Display';">Web Harmonium</h1>
        <div class="keyboard" id="keyboard">
            </div>
        <p style="margin-top: 20px; color: var(--ink-mid);">Use your mouse or keyboard to play</p>
    </div>

<script>
    const notes = ['C4', 'C#4', 'D4', 'D#4', 'E4', 'F4', 'F#4', 'G4', 'G#4', 'A4', 'A#4', 'B4', 'C5'];
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function createOscillator(freq) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = 'sawtooth'; // Classic harmonium-like buzz
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1.5);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 1.5);
    }

    const freqs = {
        'C4': 261.63, 'C#4': 277.18, 'D4': 293.66, 'D#4': 311.13, 'E4': 329.63,
        'F4': 349.23, 'F#4': 369.99, 'G4': 392.00, 'G#4': 415.30, 'A4': 440.00,
        'A#4': 466.16, 'B4': 493.88, 'C5': 523.25
    };

    function buildKeyboard() {
        const kb = document.getElementById('keyboard');
        notes.forEach(note => {
            const key = document.createElement('div');
            key.className = `key ${note.includes('#') ? 'black' : 'white'}`;
            key.dataset.note = note;
            key.addEventListener('mousedown', () => playNote(note));
            kb.appendChild(key);
        });
    }

    function playNote(note) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        createOscillator(freqs[note]);
        const el = document.querySelector(`[data-note="${note}"]`);
        el.classList.add('active');
        setTimeout(() => el.classList.remove('active'), 200);
    }

    function launchApp() {
        const splash = document.getElementById('splash');
        splash.classList.add('out');
        setTimeout(() => {
            splash.style.display = 'none';
            document.getElementById('app').classList.add('visible');
        }, 600);
    }

    // Initialize
    window.addEventListener('load', () => {
        buildKeyboard();
        document.getElementById('splash').addEventListener('click', launchApp);
        
        // Safety Auto-reveal after 3 seconds if user doesn't click
        setTimeout(() => {
            if (document.getElementById('splash').style.display !== 'none') {
                launchApp();
            }
        }, 3000);
    });
</script>
</body>
</html>
